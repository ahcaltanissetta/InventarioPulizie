<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Gestione Inventario Pulizie</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            padding: 12px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            color: #2c3e50;
            margin-bottom: 16px;
            text-align: center;
            font-size: 1.6rem;
        }

        /* ===== LOGIN ===== */
        .login-container {
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-container h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .login-container .form-group { margin-bottom: 15px; }
        .login-container .btn { margin-top: 10px; }
        .login-container .error {
            color: #e74c3c;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 10px;
        }
        .auth-toggle {
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .auth-toggle a {
            color: #3498db;
            cursor: pointer;
            text-decoration: underline;
        }
        .login-container.hidden { display: none; }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .user-info .email {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .user-info .btn {
            width: auto;
            padding: 6px 16px;
            font-size: 0.85rem;
        }

        .app-content { display: none; }
        .app-content.visible { display: block; }

        /* ===== FORM ===== */
        .form-section {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-weight: 600;
            margin-bottom: 4px;
            color: #34495e;
            font-size: 0.8rem;
        }
        .form-group input, .form-group select {
            padding: 12px 14px;
            border: 2px solid #dce4ec;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            width: 100%;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
        }
        .form-group input[type="number"] { -moz-appearance: textfield; }
        .form-group input[type="number"]::-webkit-outer-spin-button,
        .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            touch-action: manipulation;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:active { background: #2980b9; transform: scale(0.97); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:active { background: #c0392b; transform: scale(0.97); }
        .btn-success { background: #2ecc71; color: white; }
        .btn-success:active { background: #27ae60; transform: scale(0.97); }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:active { background: #e67e22; transform: scale(0.97); }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-secondary:active { background: #7f8c8d; transform: scale(0.97); }
        .btn-sm {
            padding: 10px 14px;
            font-size: 0.85rem;
            width: auto;
            min-width: 48px;
            min-height: 44px;
            border-radius: 8px;
        }

        /* ===== STATS ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: white;
            padding: 12px 6px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card h3 {
            color: #7f8c8d;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .number {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            margin-top: 2px;
        }

        /* ===== SEARCH ===== */
        .search-box {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .search-box input {
            padding: 12px 14px;
            border: 2px solid #dce4ec;
            border-radius: 10px;
            font-size: 1rem;
            width: 100%;
            background: white;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-group select {
            flex: 1;
            min-width: 80px;
            padding: 10px 12px;
            border: 2px solid #dce4ec;
            border-radius: 10px;
            font-size: 0.85rem;
            background: white;
        }
        .filter-group .btn { width: auto; padding: 10px 16px; font-size: 0.8rem; }

        /* ===== PRODUCT LIST ===== */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 10px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-left: 5px solid #3498db;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .product-card:active { background: #f5f7fa; transform: scale(0.99); }
        .product-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            pointer-events: none;
        }
        .product-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: #2c3e50;
            word-break: break-word;
            flex: 1;
        }
        .product-category {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: #ecf0f1;
            color: #2c3e50;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            font-size: 0.85rem;
            color: #555;
            pointer-events: none;
        }
        .product-details .detail-item { display: flex; align-items: center; gap: 4px; }
        .product-details .detail-item .label {
            color: #95a5a6;
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .product-details .detail-item .value {
            font-weight: 600;
            color: #2c3e50;
            word-break: break-word;
        }
        .product-quantity-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .product-quantity-badge.low { background: #fde8e8; color: #c0392b; }
        .product-quantity-badge.medium { background: #fef9e7; color: #f39c12; }
        .product-quantity-badge.high { background: #e8f8f5; color: #27ae60; }
        .product-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            justify-content: flex-end;
            border-top: 1px solid #ecf0f1;
            padding-top: 10px;
            pointer-events: auto;
        }
        .product-actions .btn {
            flex: 0 0 auto;
            padding: 8px 16px;
            font-size: 0.8rem;
            min-width: 44px;
            min-height: 40px;
        }
        .product-edit-hint {
            font-size: 0.65rem;
            color: #95a5a6;
            text-align: center;
            pointer-events: none;
            margin-top: 2px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
            font-size: 0.95rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ===== CATEGORIES ===== */
        .category-management {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .category-management-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .category-management-header h3 { color: #2c3e50; font-size: 1rem; }
        .category-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #ecf0f1;
            padding: 6px 12px 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c3e50;
        }
        .category-tag .category-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .category-tag .category-actions {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
        }
        .category-tag .category-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            touch-action: manipulation;
            color: #7f8c8d;
        }
        .add-category-form {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .add-category-form input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border: 2px solid #dce4ec;
            border-radius: 10px;
            font-size: 0.95rem;
        }
        .add-category-form .btn { width: auto; padding: 10px 20px; font-size: 0.9rem; }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px 20px 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .modal-header h2 { font-size: 1.3rem; color: #2c3e50; }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #95a5a6;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            touch-action: manipulation;
        }
        .modal-close:active { background: #ecf0f1; }
        .modal .form-grid { gap: 12px; }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions .btn { flex: 1; padding: 12px; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 480px) {
            body { padding: 8px; }
            h1 { font-size: 1.3rem; }
            .stats { grid-template-columns: 1fr 1fr; gap: 4px; }
            .stat-card { padding: 8px 4px; }
            .stat-card .number { font-size: 1.1rem; }
            .modal { padding: 18px 16px; }
            .modal-actions { flex-direction: column; }
            .modal-actions .btn { width: 100%; }
            .login-container { padding: 20px; margin: 30px auto; }
        }
        @media (min-width: 769px) {
            .product-list { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        }
        @media (min-width: 1200px) {
            .product-list { grid-template-columns: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-container" id="loginContainer">
    <h2>🔐 Inventario Pulizie</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary">Accedi</button>
        <div class="auth-toggle">
            Non hai un account? <a onclick="showSignup()">Registrati</a>
        </div>
        <div class="error" id="loginError"></div>
    </form>

    <form id="signupForm" style="display:none;">
        <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
            <label for="signupPassword">Password (min 6 caratteri)</label>
            <input type="password" id="signupPassword" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn btn-success">Registrati</button>
        <div class="auth-toggle">
            Hai già un account? <a onclick="showLogin()">Accedi</a>
        </div>
        <div class="error" id="signupError"></div>
    </form>
</div>

<!-- ===== APP ===== -->
<div class="container app-content" id="appContent">
    <h1>🧹 Inventario Pulizie</h1>

    <div class="user-info">
        <span class="email" id="userEmail">utente@email.com</span>
        <button class="btn btn-danger" onclick="logout()" style="width:auto;padding:6px 16px;font-size:0.85rem;">🚪 Esci</button>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card"><h3>Totale</h3><div class="number" id="totalProducts">0</div></div>
        <div class="stat-card"><h3>Stock Basso</h3><div class="number" id="lowStock">0</div></div>
        <div class="stat-card"><h3>Depositi</h3><div class="number" id="totalDeposits">0</div></div>
        <div class="stat-card"><h3>Categorie</h3><div class="number" id="totalCategories">0</div></div>
    </div>

    <div class="category-management">
        <div class="category-management-header"><h3>📂 Gestione Categorie</h3></div>
        <div class="category-list" id="categoryList"><span style="color:#95a5a6;">Caricamento...</span></div>
        <div class="add-category-form">
            <input type="text" id="newCategoryInput" placeholder="Nuova categoria..." maxlength="30">
            <button class="btn btn-success" onclick="addCategory()">➕ Aggiungi</button>
        </div>
    </div>

    <div class="form-section">
        <form id="productForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="productName">Nome Prodotto *</label>
                    <input type="text" id="productName" placeholder="es. Sgrassatore" required>
                </div>
                <div class="form-group">
                    <label for="productCategory">Categoria</label>
                    <select id="productCategory"></select>
                </div>
                <div class="form-group">
                    <label for="productQuantity">Quantità *</label>
                    <input type="number" id="productQuantity" placeholder="0" min="0" required>
                </div>
                <div class="form-group">
                    <label for="productDeposit">Deposito *</label>
                    <input type="text" id="productDeposit" placeholder="es. Deposito A" required>
                </div>
                <div class="form-group">
                    <label for="productLocation">Posizione *</label>
                    <input type="text" id="productLocation" placeholder="es. Scaffale 3, Ripiano 2" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">➕ Aggiungi Prodotto</button>
                </div>
            </div>
        </form>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Cerca prodotto, deposito o posizione...">
        <div class="filter-group">
            <select id="filterCategory"><option value="">Tutte le categorie</option></select>
            <select id="filterDeposit"><option value="">Tutti i depositi</option></select>
            <button class="btn btn-warning" onclick="clearFilters()">Reset</button>
        </div>
    </div>

    <div class="product-list" id="productList">
        <div class="empty-state">Caricamento prodotti...</div>
    </div>
</div>

<!-- ===== MODALI ===== -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h2>✏️ Modifica Prodotto</h2>
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <form id="editForm">
            <input type="hidden" id="editProductId">
            <div class="form-grid">
                <div class="form-group">
                    <label for="editName">Nome Prodotto *</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label for="editCategory">Categoria</label>
                    <select id="editCategory"></select>
                </div>
                <div class="form-group">
                    <label for="editQuantity">Quantità *</label>
                    <input type="number" id="editQuantity" min="0" required>
                </div>
                <div class="form-group">
                    <label for="editDeposit">Deposito *</label>
                    <input type="text" id="editDeposit" required>
                </div>
                <div class="form-group">
                    <label for="editLocation">Posizione *</label>
                    <input type="text" id="editLocation" required>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Annulla</button>
                <button type="submit" class="btn btn-primary">💾 Salva Modifiche</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="editCategoryModal">
    <div class="modal">
        <div class="modal-header">
            <h2>✏️ Modifica Categoria</h2>
            <button class="modal-close" onclick="closeEditCategoryModal()">&times;</button>
        </div>
        <form id="editCategoryForm">
            <input type="hidden" id="editCategoryOldName">
            <div class="form-grid">
                <div class="form-group">
                    <label for="editCategoryNewName">Nuovo nome categoria *</label>
                    <input type="text" id="editCategoryNewName" required maxlength="30">
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeEditCategoryModal()">Annulla</button>
                <button type="submit" class="btn btn-primary">💾 Salva</button>
            </div>
        </form>
    </div>
</div>

<script>
// ============================================================
// 🔑 CONFIGURAZIONE SUPABASE - INSERISCI I TUOI DATI QUI!
// ============================================================
const SUPABASE_URL = 'https://iptcwcxjiaarquxeheop.supabase.co/';     // <- SOSTITUISCI!
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwdGN3Y3hqaWFhcnF1eGVoZW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDgzNzksImV4cCI6MjA5ODI4NDM3OX0.-VhvjzKDOKPckJ6y5yl0nBVLU87i8amcPyGZTSdOcS0';                 // <- SOSTITUISCI!
// ============================================================

// Inizializza Supabase
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== STATO =====
let products = [];
let categories = [];
let currentUser = null;

// ===== AUTH =====
async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        currentUser = session.user;
        showApp();
        await loadCategories();
        await loadProducts();
    } else {
        showLogin();
    }
}

async function login(email, password) {
    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        currentUser = data.user;
        showApp();
        await loadCategories();
        await loadProducts();
        document.getElementById('loginError').textContent = '';
    } catch (err) {
        document.getElementById('loginError').textContent = err.message;
    }
}

async function signup(email, password) {
    try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        if (data.user) {
            alert('✅ Registrazione completata! Ora puoi accedere.');
            showLogin();
        }
        document.getElementById('signupError').textContent = '';
    } catch (err) {
        document.getElementById('signupError').textContent = err.message;
    }
}

async function logout() {
    await supabase.auth.signOut();
    currentUser = null;
    products = [];
    categories = [];
    showLogin();
}

function showLogin() {
    document.getElementById('loginContainer').classList.remove('hidden');
    document.getElementById('appContent').classList.remove('visible');
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('loginError').textContent = '';
}

function showSignup() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'block';
    document.getElementById('loginError').textContent = '';
    document.getElementById('signupError').textContent = '';
}

function showApp() {
    document.getElementById('loginContainer').classList.add('hidden');
    document.getElementById('appContent').classList.add('visible');
    document.getElementById('userEmail').textContent = currentUser?.email || 'Utente';
}

// ===== CRUD PRODOTTI =====
async function loadProducts() {
    try {
        const { data, error } = await supabase
            .from('products')
            .select('*')
            .order('id', { ascending: true });
        if (error) throw error;
        products = data || [];
        render();
    } catch (err) {
        console.error('Errore caricamento prodotti:', err);
        products = [];
        render();
    }
}

async function addProductToDB(name, category, quantity, deposit, location) {
    try {
        const { data, error } = await supabase
            .from('products')
            .insert([{
                name: name.trim(),
                category: category,
                quantity: parseInt(quantity) || 0,
                deposit: deposit.trim(),
                location: location.trim(),
                user_id: currentUser.id
            }])
            .select();
        if (error) throw error;
        if (data) {
            products.push(data[0]);
            render();
        }
        return true;
    } catch (err) {
        alert('❌ Errore: ' + err.message);
        return false;
    }
}

async function updateProductInDB(id, name, category, quantity, deposit, location) {
    try {
        const { error } = await supabase
            .from('products')
            .update({
                name: name.trim(),
                category: category,
                quantity: parseInt(quantity) || 0,
                deposit: deposit.trim(),
                location: location.trim()
            })
            .eq('id', id)
            .eq('user_id', currentUser.id);
        if (error) throw error;
        const product = products.find(p => p.id === id);
        if (product) {
            product.name = name.trim();
            product.category = category;
            product.quantity = parseInt(quantity) || 0;
            product.deposit = deposit.trim();
            product.location = location.trim();
            render();
        }
        return true;
    } catch (err) {
        alert('❌ Errore: ' + err.message);
        return false;
    }
}

async function deleteProductFromDB(id) {
    if (!confirm('Eliminare questo prodotto?')) return false;
    try {
        const { error } = await supabase
            .from('products')
            .delete()
            .eq('id', id)
            .eq('user_id', currentUser.id);
        if (error) throw error;
        products = products.filter(p => p.id !== id);
        render();
        return true;
    } catch (err) {
        alert('❌ Errore: ' + err.message);
        return false;
    }
}

async function adjustQuantityInDB(id, delta) {
    const product = products.find(p => p.id === id);
    if (!product) return;
    const newQty = product.quantity + delta;
    if (newQty < 0) {
        alert('La quantità non può essere negativa!');
        return;
    }
    try {
        const { error } = await supabase
            .from('products')
            .update({ quantity: newQty })
            .eq('id', id)
            .eq('user_id', currentUser.id);
        if (error) throw error;
        product.quantity = newQty;
        render();
    } catch (err) {
        alert('❌ Errore: ' + err.message);
    }
}

// ===== CRUD CATEGORIE =====
async function loadCategories() {
    try {
        const { data, error } = await supabase
            .from('categories')
            .select('*')
            .order('name');
        if (error) throw error;
        
        const defaults = ['Detergente', 'Sgrassatore', 'Disinfettante', 'Detersivo', 'Lucida', 'Altro'];
        const existingNames = data.map(c => c.name);
        
        for (const cat of defaults) {
            if (!existingNames.includes(cat)) {
                await supabase
                    .from('categories')
                    .insert([{ name: cat, user_id: currentUser.id }]);
            }
        }
        
        const { data: freshData } = await supabase
            .from('categories')
            .select('*')
            .order('name');
        categories = freshData || [];
        updateAllDropdowns();
        renderCategories();
        render();
    } catch (err) {
        console.error('Errore caricamento categorie:', err);
        categories = [];
    }
}

async function addCategoryToDB(name) {
    name = name.trim();
    if (!name) { alert('Inserisci un nome'); return false; }
    if (categories.some(c => c.name === name)) { alert('Esiste già!'); return false; }
    try {
        const { data, error } = await supabase
            .from('categories')
            .insert([{ name: name, user_id: currentUser.id }])
            .select();
        if (error) throw error;
        if (data) {
            categories.push(data[0]);
            updateAllDropdowns();
            renderCategories();
            render();
            document.getElementById('newCategoryInput').value = '';
        }
        return true;
    } catch (err) {
        alert('❌ Errore: ' + err.message);
        return false;
    }
}

async function deleteCategoryFromDB(name) {
    const usedCount = products.filter(p => p.category === name).length;
    if (usedCount > 0) {
        if (!confirm(`"${name}" usata da ${usedCount} prodotto/i. Eliminare? Prodotti spostati in "Altro".`)) return false;
        for (const p of products) {
            if (p.category === name) {
                await updateProductInDB(p.id, p.name, 'Altro', p.quantity, p.deposit, p.location);
            }
        }
    } else {
        if (!confirm(`Eliminare "${name}"?`)) return false;
    }
    const defaults = ['Detergente', 'Sgrassatore', 'Disinfettante', 'Detersivo', 'Lucida', 'Altro'];
    if (defaults.includes(name) && categories.filter(c => defaults.includes(c.name)).length <= 1) {
        alert('Non puoi eliminare l\'ultima categoria predefinita.');
        return false;
    }
    try {
        const { error } = await supabase
            .from('categories')
            .delete()
            .eq('name', name)
            .eq('user_id', currentUser.id);
        if (error) throw error;
        categories = categories.filter(c => c.name !== name);
        updateAllDropdowns();
        renderCategories();
        render();
        return true;
    } catch (err) {
        alert('❌ Errore: ' + err.message);
        return false;
    }
}

async function updateCategoryInDB(oldName, newName) {
    newName = newName.trim();
    if (!newName) { alert('Inserisci un nome valido'); return false; }
    if (newName === oldName) return true;
    if (categories.some(c => c.name === newName)) { alert('Esiste già!'); return false; }
    try {
        const { error } = await supabase
            .from('categories')
            .update({ name: newName })
            .eq('name', oldName)
            .eq('user_id', currentUser.id);
        if (error) throw error;
        for (const p of products) {
            if (p.category === oldName) {
                await updateProductInDB(p.id, p.name, newName, p.quantity, p.deposit, p.location);
            }
        }
        const cat = categories.find(c => c.name === oldName);
        if (cat) cat.name = newName;
        updateAllDropdowns();
        renderCategories();
        render();
        return true;
    } catch (err) {
        alert('❌ Errore: ' + err.message);
        return false;
    }
}

// ===== RENDER =====
function render() {
    renderProducts();
    updateStats();
    updateDepositFilter();
}

function renderProducts() {
    const list = document.getElementById('productList');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const catFilter = document.getElementById('filterCategory').value;
    const depFilter = document.getElementById('filterDeposit').value;

    let filtered = products.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search) ||
                          p.deposit.toLowerCase().includes(search) ||
                          p.location.toLowerCase().includes(search);
        const matchCat = !catFilter || p.category === catFilter;
        const matchDep = !depFilter || p.deposit === depFilter;
        return matchSearch && matchCat && matchDep;
    });

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">${products.length === 0 ? 'Nessun prodotto. Aggiungi il primo!' : 'Nessun prodotto trovato'}</div>`;
        return;
    }

    list.innerHTML = filtered.map(p => {
        const qtyClass = p.quantity <= 5 ? 'low' : (p.quantity <= 15 ? 'medium' : 'high');
        const qtyEmoji = p.quantity <= 5 ? '⚠️' : (p.quantity <= 15 ? '📦' : '✅');
        const color = getCategoryColor(p.category);
        return `
            <div class="product-card" style="border-left-color:${color}" onclick="openEditModal(${p.id})">
                <div class="product-card-header">
                    <span class="product-name">${escapeHtml(p.name)}</span>
                    <span class="product-category" style="background:${color}22;color:${color}">${escapeHtml(p.category)}</span>
                </div>
                <div class="product-details">
                    <div class="detail-item">
                        <span class="label">Quantità</span>
                        <span class="product-quantity-badge ${qtyClass}">${p.quantity} ${qtyEmoji}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Deposito</span>
                        <span class="value">${escapeHtml(p.deposit)}</span>
                    </div>
                    <div class="detail-item" style="grid-column:1/-1;">
                        <span class="label">Posizione</span>
                        <span class="value">${escapeHtml(p.location)}</span>
                    </div>
                </div>
                <div class="product-actions">
                    <button class="btn btn-success" onclick="event.stopPropagation(); adjustQuantityInDB(${p.id}, 1)">+1</button>
                    <button class="btn btn-warning" onclick="event.stopPropagation(); adjustQuantityInDB(${p.id}, -1)">-1</button>
                    <button class="btn btn-danger" onclick="event.stopPropagation(); deleteProductFromDB(${p.id})">🗑️</button>
                </div>
                <div class="product-edit-hint">👆 Tocca la scheda per modificare</div>
            </div>
        `;
    }).join('');
}

function renderCategories() {
    const list = document.getElementById('categoryList');
    if (!categories || categories.length === 0) {
        list.innerHTML = '<span style="color:#95a5a6;">Nessuna categoria</span>';
        return;
    }
    list.innerHTML = categories.map(cat => {
        const color = getCategoryColor(cat.name);
        const used = products.filter(p => p.category === cat.name).length;
        return `
            <span class="category-tag">
                <span class="category-color" style="background:${color}"></span>
                ${escapeHtml(cat.name)}
                <span style="font-size:0.65rem;color:#95a5a6;">(${used})</span>
                <span class="category-actions">
                    <button onclick="event.stopPropagation(); openEditCategoryModal('${escapeHtml(cat.name)}')">✏️</button>
                    <button onclick="event.stopPropagation(); deleteCategoryFromDB('${escapeHtml(cat.name)}')">🗑️</button>
                </span>
            </span>
        `;
    }).join('');
}

function updateStats() {
    document.getElementById('totalProducts').textContent = products.length;
    document.getElementById('lowStock').textContent = products.filter(p => p.quantity <= 5).length;
    document.getElementById('totalDeposits').textContent = new Set(products.map(p => p.deposit)).size;
    document.getElementById('totalCategories').textContent = categories.length;
}

function updateDepositFilter() {
    const select = document.getElementById('filterDeposit');
    const val = select.value;
    const deposits = [...new Set(products.map(p => p.deposit))].sort();
    select.innerHTML = '<option value="">Tutti i depositi</option>' +
        deposits.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
    select.value = val;
}

function updateAllDropdowns() {
    ['productCategory', 'editCategory', 'filterCategory'].forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        const val = sel.value;
        const isFilter = id === 'filterCategory';
        sel.innerHTML = (isFilter ? '<option value="">Tutte le categorie</option>' : '') +
            categories.map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join('');
        if (categories.some(c => c.name === val)) sel.value = val;
    });
}

function getCategoryColor(category) {
    const colors = {
        'Detergente': '#3498db',
        'Sgrassatore': '#e67e22',
        'Disinfettante': '#27ae60',
        'Detersivo': '#9b59b6',
        'Lucida': '#f1c40f',
        'Altro': '#95a5a6'
    };
    if (colors[category]) return colors[category];
    let hash = 0;
    for (let i = 0; i < category.length; i++) {
        hash = category.charCodeAt(i) + ((hash << 5) - hash);
    }
    return `hsl(${Math.abs(hash) % 360}, 70%, 50%)`;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterCategory').value = '';
    document.getElementById('filterDeposit').value = '';
    render();
}

// ===== MODAL PRODOTTO =====
function openEditModal(id) {
    const p = products.find(p => p.id === id);
    if (!p) return;
    document.getElementById('editProductId').value = p.id;
    document.getElementById('editName').value = p.name;
    document.getElementById('editCategory').value = p.category;
    document.getElementById('editQuantity').value = p.quantity;
    document.getElementById('editDeposit').value = p.deposit;
    document.getElementById('editLocation').value = p.location;
    document.getElementById('editModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    document.body.style.overflow = '';
}

// ===== MODAL CATEGORIA =====
function openEditCategoryModal(name) {
    document.getElementById('editCategoryOldName').value = name;
    document.getElementById('editCategoryNewName').value = name;
    document.getElementById('editCategoryModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeEditCategoryModal() {
    document.getElementById('editCategoryModal').classList.remove('active');
    document.body.style.overflow = '';
}

// ===== EVENTI =====
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
});

document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    signup(document.getElementById('signupEmail').value, document.getElementById('signupPassword').value);
});

document.getElementById('productForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('productName').value.trim();
    const category = document.getElementById('productCategory').value;
    const quantity = document.getElementById('productQuantity').value;
    const deposit = document.getElementById('productDeposit').value.trim();
    const location = document.getElementById('productLocation').value.trim();
    if (!name || !deposit || !location) { alert('Compila tutti i campi'); return; }
    if (parseInt(quantity) < 0) { alert('Quantità non negativa'); return; }
    await addProductToDB(name, category, quantity, deposit, location);
    this.reset();
    document.getElementById('productName').focus();
});

document.getElementById('editForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = parseInt(document.getElementById('editProductId').value);
    const name = document.getElementById('editName').value.trim();
    const category = document.getElementById('editCategory').value;
    const quantity = parseInt(document.getElementById('editQuantity').value);
    const deposit = document.getElementById('editDeposit').value.trim();
    const location = document.getElementById('editLocation').value.trim();
    if (!name || !deposit || !location) { alert('Compila tutti i campi'); return; }
    if (quantity < 0) { alert('Quantità non negativa'); return; }
    await updateProductInDB(id, name, category, quantity, deposit, location);
    closeEditModal();
});

document.getElementById('editCategoryForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    await updateCategoryInDB(
        document.getElementById('editCategoryOldName').value,
        document.getElementById('editCategoryNewName').value
    );
    closeEditCategoryModal();
});

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterCategory').addEventListener('change', render);
document.getElementById('filterDeposit').addEventListener('change', render);

document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
});
document.getElementById('editCategoryModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditCategoryModal();
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeEditModal(); closeEditCategoryModal(); }
});

document.getElementById('newCategoryInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addCategoryToDB(this.value); }
});

// ===== AGGIUNGI CATEGORIA DAL PULSANTE =====
async function addCategory() {
    const input = document.getElementById('newCategoryInput');
    await addCategoryToDB(input.value);
}

// ===== INIT =====
checkAuth();
</script>
