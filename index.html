<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Supabase Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        input, button { display: block; width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #3498db; color: white; border: none; cursor: pointer; }
        button:hover { background: #2980b9; }
        .error { color: red; background: #fee; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .success { color: green; background: #efe; padding: 10px; border-radius: 8px; margin: 10px 0; }
        #log { background: #f4f4f4; padding: 10px; border-radius: 8px; margin-top: 20px; font-size: 13px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <h1>🧪 Test Supabase</h1>
    
    <div id="loginBox">
        <h2>🔐 Registrati</h2>
        <input type="email" id="email" placeholder="Email" value="test@prova.it">
        <input type="password" id="password" placeholder="Password" value="test123456">
        <button onclick="testSignup()" style="background:#2ecc71;">📝 REGISTRATI</button>
        <button onclick="testLogin()" style="background:#3498db;">🔐 ACCEDI</button>
        <button onclick="testCheckUsers()" style="background:#9b59b6;">📊 CONTROLLA UTENTI</button>
        <div id="message"></div>
    </div>

    <div id="log"><strong>📋 Log:</strong></div>

    <script>
        // ============================================================
        // 🔑 CONFIGURAZIONE - METTI LE TUE CHIAVI QUI!
        // ============================================================
        const SUPABASE_URL = 'https://iptcwcxjiaarquxeheop.supabase.co/';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwdGN3Y3hqaWFhcnF1eGVoZW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDgzNzksImV4cCI6MjA5ODI4NDM3OX0.-VhvjzKDOKPckJ6y5yl0nBVLU87i8amcPyGZTSdOcS0; // <- SOSTITUISCI!
        // ============================================================

        function log(msg, isError = false) {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const prefix = isError ? '❌' : '✅';
            el.innerHTML += `\n[${time}] ${prefix} ${msg}`;
            el.scrollTop = el.scrollHeight;
            console.log(msg);
        }

        function showMessage(msg, isError = true) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = isError ? 'error' : 'success';
        }

        // Inizializza Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log('🚀 Supabase inizializzato');

        // ===== TEST REGISTRAZIONE =====
        async function testSignup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                showMessage('❌ Inserisci email e password!');
                return;
            }
            if (password.length < 6) {
                showMessage('❌ Password deve avere almeno 6 caratteri!');
                return;
            }

            log(`📝 Tentativo registrazione: ${email}`);
            showMessage('⏳ Registrazione in corso...', false);

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) {
                    log(`❌ ERRORE: ${error.message}`, true);
                    showMessage(`❌ ${error.message}`);
                    return;
                }

                log(`✅ REGISTRAZIONE RIUSCITA!`);
                log(`📊 User: ${JSON.stringify(data.user, null, 2)}`);
                showMessage(`✅ Registrato! Ora fai login.`, false);
                
                // Controlla se l'utente è stato creato
                await testCheckUsers();

            } catch (err) {
                log(`💥 ERRORE: ${err.message}`, true);
                showMessage(`💥 ${err.message}`);
            }
        }

        // ===== TEST LOGIN =====
        async function testLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                showMessage('❌ Inserisci email e password!');
                return;
            }

            log(`🔑 Tentativo login: ${email}`);
            showMessage('⏳ Accesso in corso...', false);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    log(`❌ ERRORE LOGIN: ${error.message}`, true);
                    showMessage(`❌ ${error.message}`);
                    return;
                }

                log(`✅ LOGIN RIUSCITO!`);
                log(`📊 User: ${JSON.stringify(data.user, null, 2)}`);
                showMessage(`✅ Benvenuto ${data.user.email}!`, false);

            } catch (err) {
                log(`💥 ERRORE: ${err.message}`, true);
                showMessage(`💥 ${err.message}`);
            }
        }

        // ===== TEST VERIFICA UTENTI =====
        async function testCheckUsers() {
            log('📊 Verifica utenti su Supabase...');
            
            try {
                // Nota: questa chiamata richiede il service_role key, non la anon!
                // Quindi useremo un metodo alternativo: controlliamo la sessione
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    log(`👤 Sessione attiva: ${session.user.email}`);
                    log(`📊 Utente loggato: ${session.user.email}`);
                } else {
                    log('👤 Nessuna sessione attiva');
                }
                
                // Non possiamo listare gli utenti con la anon key
                // Dovresti controllare manualmente su Supabase Dashboard > Authentication > Users
                log('📌 Controlla gli utenti su:');
                log('   Supabase Dashboard > Authentication > Users');
                log('   Dovresti vedere l\'utente appena registrato!');
                
            } catch (err) {
                log(`💥 ERRORE: ${err.message}`, true);
            }
        }

        // ===== INIT =====
        log('✅ App di test pronta!');
        log('📌 Inserisci email e password e clicca "REGISTRATI"');
        log('📌 Poi controlla su Supabase Dashboard > Authentication > Users');
    </script>
</body>
</html>
