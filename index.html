<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pulizie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        input,
        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.12);
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background: #2980b9;
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-success {
            background: #2ecc71;
        }
        .btn-success:hover {
            background: #27ae60;
        }
        .btn-danger {
            background: #e74c3c;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        .message.error {
            background: #fde8e8;
            color: #c0392b;
        }
        .message.success {
            background: #e8f8f5;
            color: #27ae60;
        }
        .message.info {
            background: #e8f0fe;
            color: #2980b9;
        }
        #log {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: monospace;
            border: 1px solid #ddd;
        }
        .user-info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info .btn {
            width: auto;
            padding: 6px 16px;
            font-size: 0.85rem;
        }
        .app-content {
            display: none;
        }
        .app-content.visible {
            display: block;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧹 Inventario Pulizie</h1>

        <div id="loginBox">
            <h2>🔐 Registrati / Accedi</h2>
            <input type="email" id="email" placeholder="Email" value="test@prova.it">
            <input type="password" id="password" placeholder="Password" value="test123456">
            <button onclick="testSignup()" class="btn-success">📝 REGISTRATI</button>
            <button onclick="testLogin()">🔐 ACCEDI</button>
            <button onclick="testLogout()" class="btn-danger">🚪 LOGOUT</button>
            <div id="message"></div>
        </div>

        <div id="appContent" class="app-content">
            <div class="user-info">
                <span style="font-weight:600;" id="userEmail">utente@email.com</span>
                <button onclick="testLogout()" class="btn-danger" style="width:auto;padding:6px 16px;">🚪 Esci</button>
            </div>
            <div style="background:#e8f8f5;padding:20px;border-radius:8px;text-align:center;">
                <h3>✅ Autenticazione riuscita!</h3>
                <p>Sei loggato come: <strong id="userEmail2"></strong></p>
                <p style="margin-top:10px;color:#7f8c8d;font-size:0.9rem;">Ora puoi usare l'app completa</p>
            </div>
        </div>

        <div id="log"><strong>📋 Log:</strong></div>
    </div>

    <script>
        // ============================================================
        // 🔑 CONFIGURAZIONE SUPABASE - METTI LE TUE CHIAVI QUI!
        // ============================================================
        var SUPABASE_URL = 'https://iptcwcxjiaarquxeheop.supabase.co/';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwdGN3Y3hqaWFhcnF1eGVoZW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDgzNzksImV4cCI6MjA5ODI4NDM3OX0.-VhvjzKDOKPckJ6y5yl0nBVLU87i8amcPyGZTSdOcS0';
        // ============================================================

        // Inizializza Supabase UNA VOLTA SOLA
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== FUNZIONI DI LOG =====
        function log(msg, isError) {
            isError = isError || false;
            var el = document.getElementById('log');
            var time = new Date().toLocaleTimeString();
            var prefix = isError ? '❌' : '✅';
            el.innerHTML += '\n[' + time + '] ' + prefix + ' ' + msg;
            el.scrollTop = el.scrollHeight;
            console.log(msg);
        }

        function showMessage(msg, type) {
            type = type || 'error';
            var el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + type;
        }

        // ===== REGISTRAZIONE =====
        async function testSignup() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showMessage('Inserisci email e password!', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('La password deve avere almeno 6 caratteri!', 'error');
                return;
            }

            log('Tentativo registrazione: ' + email);
            showMessage('Registrazione in corso...', 'info');

            try {
                var result = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (result.error) {
                    log('ERRORE: ' + result.error.message, true);
                    showMessage('Errore: ' + result.error.message, 'error');
                    return;
                }

                log('REGISTRAZIONE RIUSCITA!');
                log('User: ' + JSON.stringify(result.data.user));
                showMessage('Registrazione completata! Ora puoi accedere.', 'success');

                // Prova login automatico
                setTimeout(function() {
                    testLogin();
                }, 1000);

            } catch (err) {
                log('ERRORE: ' + err.message, true);
                showMessage('Errore: ' + err.message, 'error');
            }
        }

        // ===== LOGIN =====
        async function testLogin() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showMessage('Inserisci email e password!', 'error');
                return;
            }

            log('Tentativo login: ' + email);
            showMessage('Accesso in corso...', 'info');

            try {
                var result = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (result.error) {
                    log('ERRORE LOGIN: ' + result.error.message, true);
                    showMessage('Errore login: ' + result.error.message, 'error');
                    return;
                }

                log('LOGIN RIUSCITO!');
                log('User: ' + JSON.stringify(result.data.user));
                showMessage('Benvenuto ' + result.data.user.email + '!', 'success');

                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('appContent').className = 'app-content visible';
                document.getElementById('userEmail').textContent = result.data.user.email;
                document.getElementById('userEmail2').textContent = result.data.user.email;

            } catch (err) {
                log('ERRORE: ' + err.message, true);
                showMessage('Errore: ' + err.message, 'error');
            }
        }

        // ===== LOGOUT =====
        async function testLogout() {
            try {
                await supabaseClient.auth.signOut();
                log('Logout effettuato');
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('appContent').className = 'app-content';
                showMessage('Logout effettuato', 'success');
            } catch (err) {
                log('ERRORE LOGOUT: ' + err.message, true);
            }
        }

        // ===== CONTROLLA SESSIONE ALL'AVVIO =====
        async function checkSession() {
            try {
                var result = await supabaseClient.auth.getSession();
                if (result.data.session) {
                    log('Sessione attiva: ' + result.data.session.user.email);
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('appContent').className = 'app-content visible';
                    document.getElementById('userEmail').textContent = result.data.session.user.email;
                    document.getElementById('userEmail2').textContent = result.data.session.user.email;
                } else {
                    log('Nessuna sessione attiva');
                }
            } catch (err) {
                log('Errore: ' + err.message, true);
            }
        }

        // ===== AVVIA APP =====
        log('App inizializzata');
        log('URL: ' + SUPABASE_URL);
        log('Key: ' + SUPABASE_ANON_KEY.substring(0, 20) + '...');
        checkSession();
        log('✅ Pronto! Inserisci email e clicca REGISTRATI');
    </script>

</body>
</html>
